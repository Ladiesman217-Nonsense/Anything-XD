<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hellscape</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
    color:#ff3b3b;
}

/* background glow */
.hell{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at bottom,#7a0000,#000 70%);
}

/* drifting smoke */
.smoke{
    position:absolute;
    width:200%;
    height:200%;
    background:repeating-linear-gradient(
        45deg,
        rgba(255,0,0,0.05),
        rgba(255,0,0,0.05) 10px,
        transparent 10px,
        transparent 20px
    );
    animation:drift 25s linear infinite;
}

@keyframes drift{
    from{transform:translateX(-20%)}
    to{transform:translateX(20%)}
}

/* red pool */
.pool{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:linear-gradient(#660000,#330000);
    box-shadow:0 0 40px red inset;
}

/* wandering corpse silhouette */
.corpse{
    position:absolute;
    bottom:120px;
    left:-100px;
    width:60px;
    height:120px;
    background:#111;
    border-radius:10px;
    animation:walk 14s linear infinite;
}

.corpse::before{
    content:"";
    position:absolute;
    top:-30px;
    left:15px;
    width:30px;
    height:30px;
    background:#111;
    border-radius:50%;
}

.corpse::after{
    content:"";
    position:absolute;
    top:-18px;
    left:20px;
    width:5px;
    height:5px;
    background:red;
    border-radius:50%;
    box-shadow:10px 0 red;
}

@keyframes walk{
    0%{left:-100px}
    100%{left:110%}
}

/* demon silhouette */
.demon{
    position:absolute;
    bottom:120px;
    right:120px;
    width:80px;
    height:140px;
    background:#0a0a0a;
    clip-path:polygon(50% 0%,70% 20%,100% 40%,80% 100%,20% 100%,0% 40%,30% 20%);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0)}
}

/* prisoner silhouette */
.prisoner{
    position:absolute;
    bottom:120px;
    right:200px;
    width:40px;
    height:90px;
    background:#111;
    border-radius:8px;
    animation:shake 0.6s infinite;
}

.prisoner::before{
    content:"";
    position:absolute;
    top:-20px;
    left:10px;
    width:20px;
    height:20px;
    background:#111;
    border-radius:50%;
}

@keyframes shake{
    0%{transform:translateX(0)}
    50%{transform:translateX(3px)}
    100%{transform:translateX(0)}
}

/* glowing title */
.title{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;
    font-size:38px;
    letter-spacing:5px;
    text-shadow:0 0 20px red;
}

/* glitch text effect */
.glitch{
    animation:glitch 2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0)}
    25%{transform:translate(-2px,1px)}
    50%{transform:translate(2px,-1px)}
    75%{transform:translate(-1px,2px)}
    100%{transform:translate(0)}
}

</style>
</head>

<body>

<div class="hell"></div>
<div class="smoke"></div>

<div class="title glitch">THE LOWER REALM</div>

<div class="pool"></div>

<div class="corpse"></div>
<div class="demon"></div>
<div class="prisoner"></div>

<script>
const text = [
"THE LOST SOULS WANDER",
"THE DEMON NEVER SLEEPS",
"NO ESCAPE FROM THE ABYSS",
"THE SCREAMS ECHO FOREVER"
]

setInterval(()=>{
    document.querySelector(".title").textContent =
        text[Math.floor(Math.random()*text.length)]
},4000)
</script>

</body>
</html>
