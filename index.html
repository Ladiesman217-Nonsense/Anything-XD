<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hell Walker</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
    color:red;
}

/* background flames effect */
.hell{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at bottom, #550000, #000000 70%);
}

/* floating smoke */
.smoke{
    position:absolute;
    width:200%;
    height:200%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255,0,0,0.05),
        rgba(255,0,0,0.05) 10px,
        transparent 10px,
        transparent 20px
    );
    animation: drift 20s linear infinite;
}

@keyframes drift{
    from{transform:translateX(-20%)}
    to{transform:translateX(20%)}
}

/* corpse silhouette */
.corpse{
    position:absolute;
    bottom:40px;
    left:-120px;
    width:80px;
    height:160px;
    background:#111;
    border-radius:20px 20px 10px 10px;
    animation: walk 12s linear infinite;
}

/* head */
.corpse::before{
    content:"";
    position:absolute;
    top:-40px;
    left:20px;
    width:40px;
    height:40px;
    background:#111;
    border-radius:50%;
}

/* glowing eyes */
.corpse::after{
    content:"";
    position:absolute;
    top:-25px;
    left:32px;
    width:6px;
    height:6px;
    background:red;
    border-radius:50%;
    box-shadow:12px 0 red;
}

/* walking movement */
@keyframes walk{
    0%{ left:-120px; }
    100%{ left:110%; }
}

/* title text */
.title{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:40px;
    letter-spacing:5px;
    text-shadow:0 0 20px red;
}

/* glitch effect */
.glitch{
    animation: glitch 2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0)}
    20%{transform:translate(-2px,2px)}
    40%{transform:translate(2px,-2px)}
    60%{transform:translate(-1px,1px)}
    80%{transform:translate(1px,-1px)}
    100%{transform:translate(0)}
}

</style>
</head>

<body>

<div class="hell"></div>
<div class="smoke"></div>

<div class="title glitch">
THE DAMNED WALK
</div>

<div class="corpse"></div>

<script>

/* random creepy messages */

const messages = [
"THE SOULS NEVER REST",
"YOU SHOULD NOT BE HERE",
"THE WALKER IS WATCHING",
"HELL HAS NO EXIT"
]

setInterval(()=>{
    document.querySelector(".title").textContent =
        messages[Math.floor(Math.random()*messages.length)]
},4000)

</script>

</body>
</html>
