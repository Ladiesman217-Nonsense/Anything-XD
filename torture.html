<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Target Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#87CEEB,#bdf2ff);
    font-family:Arial;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    font-size:22px;
    font-weight:bold;
}

#highscore{
    position:absolute;
    top:40px;
    left:10px;
    font-size:18px;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>
<div id="highscore">High Score: 10</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let score = 0
let highScore = 10
let gameOver = false

let target = {
    x:100,
    y:300,
    speed:3,
    alive:true
}

canvas.addEventListener("click",(e)=>{

    if(!target.alive) return

    const dx = e.clientX - target.x
    const dy = e.clientY - target.y
    const dist = Math.sqrt(dx*dx + dy*dy)

    if(dist < 40){
        score++
        document.getElementById("score").textContent = "Score: " + score

        target.x = Math.random()*canvas.width
        target.y = 200 + Math.random()*300
    }

    if(score >= highScore){
        target.alive = false
    }

})

function drawStickman(x,y,fallen=false){

    ctx.strokeStyle="black"
    ctx.lineWidth=3

    ctx.beginPath()

    if(!fallen){

        ctx.arc(x,y-30,10,0,Math.PI*2)
        ctx.moveTo(x,y-20)
        ctx.lineTo(x,y+20)
        ctx.moveTo(x,y)
        ctx.lineTo(x-20,y+10)
        ctx.moveTo(x,y)
        ctx.lineTo(x+20,y+10)
        ctx.moveTo(x,y+20)
        ctx.lineTo(x-15,y+40)
        ctx.moveTo(x,y+20)
        ctx.lineTo(x+15,y+40)

    }else{

        ctx.arc(x,y,10,0,Math.PI*2)
        ctx.moveTo(x,y)
        ctx.lineTo(x+40,y)
        ctx.moveTo(x+15,y)
        ctx.lineTo(x+30,y-15)
        ctx.moveTo(x+15,y)
        ctx.lineTo(x+30,y+15)
    }

    ctx.stroke()
}

function update(){

    ctx.clearRect(0,0,canvas.width,canvas.height)

    if(target.alive){
        target.x += target.speed

        if(target.x > canvas.width || target.x < 0){
            target.speed *= -1
        }

        drawStickman(target.x,target.y)

    }else{
        drawStickman(target.x,target.y,true)

        ctx.fillStyle="red"
        ctx.font="30px Arial"
        ctx.fillText("High Score Reached!", canvas.width/2-150,100)
    }

    requestAnimationFrame(update)
}

update()

</script>

</body>
</html>
